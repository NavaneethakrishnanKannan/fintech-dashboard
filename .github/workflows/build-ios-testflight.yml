# Build signed iOS IPA and upload to TestFlight.
# Requires GitHub secrets: APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID,
#   IOS_DISTRIBUTION_P12_BASE64, IOS_DISTRIBUTION_P12_PASSWORD, IOS_PROVISIONING_PROFILE_BASE64
# See docs/TESTFLIGHT.md for setup.

name: Build iOS for TestFlight

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-upload:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: mobile-app/package-lock.json

      - name: Install dependencies
        working-directory: mobile-app
        run: npm ci

      - name: Add iOS platform if missing
        working-directory: mobile-app
        run: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor
        working-directory: mobile-app
        env:
          CAPACITOR_SERVER_URL: ${{ vars.CAPACITOR_SERVER_URL || 'https://fintech-dashboard-phi-two.vercel.app' }}
        run: npx cap sync ios

      - name: Create keychain and import certificate
        env:
          BUILD_KEYCHAIN_PASSWORD: ${{ secrets.BUILD_KEYCHAIN_PASSWORD || 'build-keychain-pass' }}
          IOS_DISTRIBUTION_P12_BASE64: ${{ secrets.IOS_DISTRIBUTION_P12_BASE64 }}
          IOS_DISTRIBUTION_P12_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_P12_PASSWORD }}
        run: |
          if [ -z "$IOS_DISTRIBUTION_P12_BASE64" ]; then
            echo "::error::IOS_DISTRIBUTION_P12_BASE64 secret is not set. See docs/TESTFLIGHT.md"
            exit 1
          fi
          security create-keychain -p "$BUILD_KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$BUILD_KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          echo "$IOS_DISTRIBUTION_P12_BASE64" | base64 --decode -o dist.p12
          security import dist.p12 -k build.keychain -P "$IOS_DISTRIBUTION_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$BUILD_KEYCHAIN_PASSWORD" build.keychain

      - name: Install provisioning profile
        env:
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          if [ -z "$IOS_PROVISIONING_PROFILE_BASE64" ]; then
            echo "::error::IOS_PROVISIONING_PROFILE_BASE64 secret is not set. See docs/TESTFLIGHT.md"
            exit 1
          fi
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode -o profile.mobileprovision
          PROFILE_UUID=$(security cms -D -i profile.mobileprovision | plutil -extract UUID raw -)
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID".mobileprovision
          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV

      - name: Archive for App Store
        working-directory: mobile-app/ios/App
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_TEAM_ID" ]; then
            echo "::error::APPLE_TEAM_ID secret is not set. See docs/TESTFLIGHT.md"
            exit 1
          fi
          xcodebuild -workspace App.xcworkspace -scheme App \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -archivePath "$RUNNER_WORKSPACE/App.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID" \
            archive

      - name: Export IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.wealthsaas.app</key>
              <string>$PROFILE_UUID</string>
            </dict>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_WORKSPACE/App.xcarchive" \
            -exportPath "$RUNNER_WORKSPACE/export" \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload to TestFlight
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          if [ -z "$APPLE_ID" ] || [ -z "$APPLE_APP_SPECIFIC_PASSWORD" ]; then
            echo "::error::APPLE_ID and APPLE_APP_SPECIFIC_PASSWORD secrets are required. See docs/TESTFLIGHT.md"
            exit 1
          fi
          IPA=$(find "$RUNNER_WORKSPACE/export" -name "*.ipa" -type f | head -1)
          if [ -z "$IPA" ]; then echo "::error::No IPA found"; exit 1; fi
          xcrun altool --upload-app --type ios --file "$IPA" \
            --username "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD"

      - name: Upload IPA artifact (optional)
        uses: actions/upload-artifact@v4
        with:
          name: wealth-saas-ios-ipa
          path: export/*.ipa
        if: always()
        continue-on-error: true
